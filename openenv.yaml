name: hallucination-guard-env
description: |
  An OpenEnv RL environment that trains AI models to answer questions
  ONLY from verified context documents — penalizing hallucination and
  rewarding factual grounding.

  v4.0: 1,090,163 examples across 38 real-world datasets spanning QA,
  medical, math, science, news, and summarisation domains.

  Inspired by real experiences with AI hallucination during research,
  this environment helps train more reliable and trustworthy AI systems.

version: 4.0.0
author: community
license: MIT

# OpenEnv configuration
openenv:
  # Environment type
  env_type: custom

  # Server configuration
  server:
    port: 8000
    host: 0.0.0.0

  # Environment parameters
  parameters:
    max_questions: 10

  # Entry points
  entry_points:
    server: server.app:app
    client: client:HallucinationClient

# Dependencies
dependencies:
  - openenv-core>=0.2.0
  - fastapi>=0.100.0
  - uvicorn>=0.23.0
  - requests>=2.31.0

# Tags for discovery
tags:
  - hallucination-detection
  - question-answering
  - grounded-generation
  - fact-checking
  - rl-environment

# Dataset info
datasets:
  - squad
  - squad_v2
  - trivia_qa
  - halueval
  - truthful_qa
  - hotpotqa
  - boolq
  - faithdial
  - fever
  - arc
  - openbookqa
  - ms_marco
  - coqa
  - nq_open
  - commonsense_qa
  - winogrande
  - drop
  - race
  - newsqa
  - hellaswag
  - adversarial_qa
  - ag_news
  - aqua_rat
  - circa
  - climate_fever
  - cnn_dailymail
  - medqa
  - medmcqa
  - medical_questions
  - pubmedqa
  - qasc
  - quartz
